<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de Card</title>
    <style>
        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        .card {
            width: 300px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            font-family: Arial, sans-serif;
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .card-title {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
        }

        .card-text {
            color: #555;
            margin-bottom: 15px;
        }

        .card-btn {
            display: inline-block;
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        .card-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <div id="cardContainer" class="card-container">
        <!-- Las cards se insertarán aquí -->
    </div>

    <script>

        // Datos para múltiples cards
        const productos = [
            {
                titulo: 'Producto 1',
                imagen: 'https://via.placeholder.com/300x200/ff5733',
                descripcion: 'Descripción detallada del producto 1.',
                precio: '$19.99'
            },
            {
                titulo: 'Producto 2',
                imagen: 'https://via.placeholder.com/300x200/33ff57',
                descripcion: 'Descripción detallada del producto 2.',
                precio: '$29.99'
            },
            {
                titulo: 'Producto 3',
                imagen: 'https://via.placeholder.com/300x200/3357ff',
                descripcion: 'Descripción detallada del producto 3.',
                precio: '$39.99'
            }
        ];


        // Función para crear una card
        function crearCard(producto) {
            const card = document.createElement('div');
            card.className = 'card';

            card.innerHTML = `
        <img src="${producto.imagen}" alt="${producto.titulo}" class="card-img">
        <div class="card-body">
            <h3 class="card-title">${producto.titulo}</h3>
            <p class="card-text">${producto.descripcion}</p>
            <p class="card-price">${producto.precio}</p>
            <button class="card-btn">Agregar al carrito</button>
        </div>
    `;

            return card;
        }


        // Insertar todas las cards
        const contenedor = document.getElementById('cardContainer');
        productos.forEach(producto => {
            contenedor.appendChild(crearCard(producto));
        });


        // Agregar evento a los botones (delegación de eventos)
        contenedor.addEventListener('click', function (e) {
            if (e.target.classList.contains('card-btn')) {
                const card = e.target.closest('.card');
                const titulo = card.querySelector('.card-title').textContent;
                alert(`Agregaste "${titulo}" al carrito`);
            }
        });


    </script>
</body>

</html>
