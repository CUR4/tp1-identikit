<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de Card</title>
    <style>
        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }
        
        .card {
            width: 300px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-family: Arial, sans-serif;
        }
        
        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .card-body {
            padding: 15px;
        }
        
        .card-title {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
        }
        
        .card-text {
            color: #555;
            margin-bottom: 15px;
        }
        
        .card-btn {
            display: inline-block;
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        
        .card-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div id="cardContainer" class="card-container">
        <!-- Las cards se insertarán aquí -->
    </div>

    <script>

// Crear elementos de la card

const card = document.createElement('div');
        card.className = 'card';
        
        // Crear imagen
        const img = document.createElement('img');
        img.className = 'card-img';
        img.src = 'https://via.placeholder.com/300x200';
        img.alt = 'Imagen de ejemplo';
        
       
 // Crear cuerpo de la card

 const cardBody = document.createElement('div');
        cardBody.className = 'card-body';
        
        // Crear título
        const title = document.createElement('h3');
        title.className = 'card-title';
        title.textContent = 'Título de la Card';
        
        // Crear texto
        const text = document.createElement('p');
        text.className = 'card-text';
        text.textContent = 'Este es un ejemplo de cómo crear y agregar una card dinámicamente con .';
        
        // Crear botón
        const button = document.createElement('a');
        button.className = 'card-btn';
        button.href = '#';
        button.textContent = 'Ver más';
        
// Ensamblar la card
        
        cardBody.appendChild(title);
        cardBody.appendChild(text);
        cardBody.appendChild(button);
        
        card.appendChild(img);
        card.appendChild(cardBody);
        
// Insertar la card en el contenedor

        document.getElementById('cardContainer').appendChild(card);

</script>
</body>
</html>
