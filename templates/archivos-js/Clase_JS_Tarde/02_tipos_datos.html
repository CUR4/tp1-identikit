<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>

// Tipos de Datos Primitivos

        // String (cadena de texto)
        const texto = "Hola mundo";
        const comillas = "Se puede usar 'comillas simples' o \"dobles\"";


        // Number (número)
        const entero = 42;
        const decimal = 3.14;
        const infinito = Infinity;
        const noNumero = NaN; // Not a Number

        
        // Boolean (booleano)
        const verdadero = true;
        const falso = false;


        // Null (valor nulo)
        const nulo = null;
        console.log(nulo); // null
        console.log(typeof nulo); // "object" (esto es un comportamiento histórico en JavaScript)

        // Undefined (no definido)
        let noDefinido;
        const noDefinido2 = undefined;


// Tipos de Datos No Primitivos (Objetos)

        // Object (objeto)
        const objeto = {
            clave: "valor",
            numero: 123,
            funcion: function () { } // Método del Objeto
        };


        // Array (arreglo)
        const arreglo = [1, "dos", true, { clave: "valor" }];
        console.log(arreglo[0]); // 1


        // Date (fecha)
        const fecha = new Date();


// Comprobación de Tipos

        typeof "texto"; // "string"
        typeof 42;      // "number"
        typeof true;    // "boolean"
        typeof null;    // "object" (¡error conocido en !)
        typeof undefined; // "undefined"
        typeof {};      // "object"
        typeof [];      // "object"
        typeof function () { }; // "function"

    </script>
</body>

</html>
