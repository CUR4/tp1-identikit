<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <form>

        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre"><br>

        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido"><br>

        <label for="email">Dirección de e-mail:</label>
        <input type="email" id="email" name="email"><br>

        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad"><br>

        <span>Lenguaje Favorito:</span>
        <input type="radio" id="html" value="html" name="lenguaje">
        <label for="html">HTML</label>
        <input type="radio" id="css" value="css" name="lenguaje">
        <label for="css">CSS</label><br>


        <label for="nacionalidad">Seleccione su nacionalidad:</label>
        <select id="nacionalidad" name="nacionalidad">
            <option value="Argentina">💙 Argentina</option>
            <option value="Chile">Chile</option>
            <option value="Brasil">Brasil</option>
        </select> <br>

        <textarea name="message" style="width:50%; height:50px;"></textarea><br>

        <input type="submit" value="Enviar">
        <input type="reset" value="Borrar formulario">

    </form>

    <script>

        // Script para ver por consola los datos enviados (agregar name a los inputs)

        const form = document.querySelector('form');

        form.addEventListener('submit', (e) => {
            e.preventDefault(); // evita recargar la página

            const formData = new FormData(form);
            const datos = Object.fromEntries(formData.entries());

            console.log('Datos enviados:', datos);
        });
    </script>
</body>

</html>
